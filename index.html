<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>고성군 캠핑장 빈자리 보드</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0a;
  --card: #141414;
  --card-hover: #1a1a1a;
  --border: #262626;
  --border-strong: #333;
  --text: #e5e5e5;
  --text-dim: #737373;
  --accent: #ccff00;
  --accent-soft: #c8e882;
  --gray: #6b7280;
  --warn: #ffaa3d;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
  font-weight: 400;
  line-height: 1.5;
  padding: 24px;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 24px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
}

.header h1 {
  font-size: 22px;
  font-weight: 600;
  letter-spacing: -0.5px;
}

.header h1 span {
  color: var(--accent);
}

.meta {
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 12px;
  color: var(--text-dim);
}

.dot {
  display: inline-block;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--accent);
  margin-right: 6px;
  animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

.refresh {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text);
  padding: 6px 12px;
  border-radius: 6px;
  font-size: 12px;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.15s;
}

.refresh:hover {
  border-color: var(--accent);
  color: var(--accent);
}

.legend {
  display: flex;
  gap: 16px;
  margin-bottom: 20px;
  font-size: 11px;
  color: var(--text-dim);
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
}

.swatch {
  width: 14px;
  height: 14px;
  border-radius: 3px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
  gap: 16px;
}

.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 20px;
  transition: border-color 0.15s, transform 0.15s;
  opacity: 0;
  animation: fadeIn 0.3s ease-out forwards;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(4px); }
  to { opacity: 1; transform: translateY(0); }
}

.card:hover {
  border-color: var(--border-strong);
  background: var(--card-hover);
}

.card.has-availability {
  border-color: rgba(204, 255, 0, 0.3);
}

.card.has-availability:hover {
  border-color: var(--accent);
}

.card-header {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-bottom: 14px;
}

.card-title {
  font-size: 16px;
  font-weight: 600;
  letter-spacing: -0.3px;
}

.card-link {
  font-size: 11px;
  color: var(--text-dim);
  text-decoration: none;
  transition: color 0.15s;
}

.card-link:hover {
  color: var(--accent);
}

.matrix {
  font-size: 11px;
  font-variant-numeric: tabular-nums;
}

.matrix-row {
  display: grid;
  grid-template-columns: minmax(90px, 1.4fr) repeat(8, minmax(28px, 1fr));
  gap: 2px;
  align-items: center;
  margin-bottom: 2px;
}

.matrix-row.head {
  color: var(--text-dim);
  font-size: 10px;
  padding-bottom: 6px;
  margin-bottom: 4px;
  border-bottom: 1px solid var(--border);
}

.area-name {
  color: var(--text-dim);
  padding-right: 6px;
  font-size: 11px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.cell {
  text-align: center;
  padding: 6px 2px;
  border-radius: 4px;
  font-weight: 500;
  background: rgba(107, 114, 128, 0.08);
  color: var(--text-dim);
  transition: background 0.15s;
}

.cell.has-room {
  background: var(--accent);
  color: #000;
  font-weight: 700;
}

.date-h {
  text-align: center;
}

.date-h .day {
  color: var(--text-dim);
}

.date-h .dow {
  font-weight: 600;
  font-size: 10px;
  display: block;
}

.date-h .dow.sat { color: var(--accent-soft); }
.date-h .dow.sun { color: var(--warn); }

.empty {
  color: var(--text-dim);
  text-align: center;
  padding: 80px 20px;
  font-size: 13px;
  line-height: 1.8;
}

.empty strong {
  color: var(--text);
  display: block;
  margin-bottom: 8px;
  font-size: 14px;
}

.stat-bar {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 20px;
  padding: 12px 16px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 12px;
}

.stat-bar .num {
  font-size: 18px;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
}

.stat-bar .num.accent { color: var(--accent); }

@media (max-width: 640px) {
  body { padding: 16px; }
  .header { flex-direction: column; align-items: flex-start; gap: 10px; }
  .grid { grid-template-columns: 1fr; }
  .matrix-row { grid-template-columns: minmax(70px, 1.2fr) repeat(8, minmax(22px, 1fr)); }
  .stat-bar { flex-wrap: wrap; }
}
</style>
</head>
<body>
<header class="header">
  <h1>고성군 캠핑장 <span>빈자리 보드</span></h1>
  <div class="meta">
    <span><span class="dot"></span><span id="updated">로딩 중...</span></span>
    <button class="refresh" onclick="load()">새로고침</button>
  </div>
</header>

<div class="legend">
  <div class="legend-item"><div class="swatch" style="background:var(--accent)"></div>빈자리 있음</div>
  <div class="legend-item"><div class="swatch" style="background:rgba(107,114,128,0.15)"></div>예약불가</div>
  <div class="legend-item"><span style="color:var(--accent-soft);font-weight:600">토</span> 토요일</div>
  <div class="legend-item"><span style="color:var(--warn);font-weight:600">일</span> 일요일</div>
</div>

<main id="main"><div class="empty">데이터 불러오는 중...</div></main>

<script>
const FALLBACK = 'https://gwgs.pubcamping.kr/Home/H10000/H10100/productSearch';
const CAMP_URLS = {
  1: 'https://gwgs.pubcamping.kr/@oho/index',
  2: FALLBACK,
  3: 'https://gwgs.pubcamping.kr/@song/index',
  4: 'https://gwgs.pubcamping.kr/@jajakdo/index',
  5: FALLBACK,
  6: FALLBACK,
};

async function load() {
  const main = document.getElementById('main');
  const updatedEl = document.getElementById('updated');

  try {
    const res = await fetch('./dashboard.json?t=' + Date.now());
    if (!res.ok) throw new Error('dashboard.json not found');
    const { updated, data } = await res.json();
    const mins = Math.floor((Date.now() - new Date(updated).getTime()) / 60000);
    updatedEl.textContent = mins < 1 ? '방금 업데이트' : `${mins}분 전 업데이트`;
    render(data);
  } catch (e) {
    main.innerHTML = `<div class="empty">
      <strong>⏳ 데이터 준비 중</strong>
      첫 cron 실행 후 데이터가 표시됩니다.<br>
      Actions 탭 → Run workflow를 한 번 돌리면 즉시 생성됩니다.
    </div>`;
    updatedEl.textContent = '데이터 없음';
  }
}

function render(data) {
  // 캠핑장별 그룹화
  const byCamp = {};
  let totalAvail = 0;
  let totalSites = 0;

  for (const r of data) {
    if (!byCamp[r.campNo]) byCamp[r.campNo] = { name: r.campName, dates: {} };
    if (!byCamp[r.campNo].dates[r.date]) byCamp[r.campNo].dates[r.date] = { dow: r.dow, areas: [] };
    byCamp[r.campNo].dates[r.date].areas.push(r);
    totalAvail += r.roomCnt;
    totalSites += r.totRoomCnt;
  }

  // 캠핑장별 구역/날짜 정리 + 빈자리 유무 표시
  for (const k in byCamp) {
    const c = byCamp[k];
    const areas = new Map();
    const dates = new Set();
    let hasAny = false;
    for (const d in c.dates) {
      dates.add(d);
      for (const a of c.dates[d].areas) {
        areas.set(a.areaNo, a.areaName);
        if (a.roomCnt > 0) hasAny = true;
      }
    }
    c.allAreas = [...areas].map(([no, name]) => ({ no, name }));
    c.allDates = [...dates].sort();
    c.hasAvailability = hasAny;
  }

  const sorted = Object.entries(byCamp).sort((a, b) => +a[0] - +b[0]);
  const totalCamps = sorted.length;
  const availCamps = sorted.filter(([, c]) => c.hasAvailability).length;

  const statBar = `
    <div class="stat-bar">
      <span><span class="num accent">${availCamps}</span> <span style="color:var(--text-dim)">/ ${totalCamps} 캠핑장에 빈자리</span></span>
      <span style="color:var(--border-strong)">|</span>
      <span><span class="num">${totalAvail}</span> <span style="color:var(--text-dim)">총 빈자리 수</span></span>
      <span style="color:var(--border-strong)">|</span>
      <span><span class="num" style="color:var(--text-dim)">${totalSites}</span> <span style="color:var(--text-dim)">전체 사이트</span></span>
    </div>
  `;

  document.getElementById('main').innerHTML = statBar + '<div class="grid">' + sorted.map(([no, c], idx) => {
    const url = CAMP_URLS[no] || FALLBACK;
    const headers = c.allDates.map(d => {
      const dow = c.dates[d]?.dow || '';
      const cls = dow === '토' ? 'sat' : 'sun';
      return `<div class="date-h"><span class="day">${d.slice(4,6)}/${d.slice(6,8)}</span><span class="dow ${cls}">${dow}</span></div>`;
    }).join('');

    const rows = c.allAreas.map(a => {
      const cells = c.allDates.map(d => {
        const f = c.dates[d]?.areas.find(x => x.areaNo === a.no);
        const cnt = f?.roomCnt ?? 0;
        return `<div class="cell ${cnt > 0 ? 'has-room' : ''}">${cnt}</div>`;
      }).join('');
      return `<div class="matrix-row"><div class="area-name" title="${a.name}">${a.name}</div>${cells}</div>`;
    }).join('');

    return `
      <article class="card${c.hasAvailability ? ' has-availability' : ''}" style="animation-delay:${idx * 0.05}s">
        <header class="card-header">
          <div class="card-title">${c.name}</div>
          <a class="card-link" href="${url}" target="_blank" rel="noopener">예약 →</a>
        </header>
        <div class="matrix">
          <div class="matrix-row head"><div></div>${headers}</div>
          ${rows}
        </div>
      </article>
    `;
  }).join('') + '</div>';
}

load();
setInterval(load, 60000); // 1분마다 자동 새로고침
</script>
</body>
</html>
